services:
  # Banco de Dados PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: carretas-postgres
    environment:
      POSTGRES_DB: sistema_carretas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-database.sql:/docker-entrypoint-initdb.d/init-database.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carretas-network
    restart: unless-stopped

  # Cache Redis
  redis:
    image: redis:7-alpine
    container_name: carretas-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carretas-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carretas-backend
    environment:
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: http://gestaosobrerodas.com.br,http://76.13.170.155

      # Database
      DB_HOST: carretas-postgres
      DB_PORT: 5432
      DB_NAME: sistema_carretas
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

      # Redis
      REDIS_HOST: carretas-redis
      REDIS_PORT: 6379

      # MinIO removido (Uso local de disco)

      # JWT
      JWT_SECRET: ${JWT_SECRET:-super_secure_random_secre_key_change_in_prod_12345}

      # CORS
      CORS_ORIGIN: http://gestaosobrerodas.com.br,http://76.13.170.155

      # Email (Brevo/SMTP) — configure no .env da VPS, nunca no código
      SMTP_HOST: ${SMTP_HOST:-smtp-relay.brevo.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-contato@gestaosobrerodas.com.br}

    ports:
      - "3001:3001" # Enable for local access
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - carretas-network
    restart: unless-stopped

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-}
    container_name: carretas-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - carretas-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  carretas-network:
    driver: bridge
